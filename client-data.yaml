REVIEWER_2_NAME: "Alecsis Pesantez"
REVIEWER_2_DATE: "a year ago"
REVIEWER_2_TEXT: "Training at Camal and Cruz changed my life and pushed me to a limit I never knew existed. Professor Cruz has an incredible knowledge of the fine details of Jiu Jitsu. Facility is clean and professional. Highly recommended for anyone to start their journey."

REVIEWER_3_NAME: "Quentin DeMarco"
REVIEWER_3_DATE: "a year ago"
REVIEWER_3_TEXT: "Every experience at Cruz BJJ was outstanding. The facility is clean and the people are great to train with. Under the guidance of Jamie Cruz &#x2014; I give this place a 10/10 and highly recommend."

REVIEWER_4_NAME: "Slater"
REVIEWER_4_DATE: "a year ago"
REVIEWER_4_TEXT: "Camal and Cruz is an incredible training environment that fosters both personal growth and camaraderie. Everyone was so welcoming and they definitely give you the work. Definitely recommend this gym."

REVIEWER_5_NAME: "Johnathan Freeman"
REVIEWER_5_DATE: "a year ago"
REVIEWER_5_TEXT: "A must go to gym especially if you are in the middle of your journey and need a place to cross train. Professor Cruz is one of a kind and has so much insight into Jiu Jitsu. The entire coaching staff are welcoming and will push you to be your best."

REVIEWER_6_NAME: "Jason C."
REVIEWER_6_DATE: "a year ago"
REVIEWER_6_TEXT: "It must have been at least 8+ years training here. This facility is an integral part of my family&#x2019;s lifestyle &#x2014; when we bought a home, being within daily distance was one of our top 5 criteria. The student&#x2019;s growth is put first and foremost. Open 7 days a week with Judo, BJJ, Wrestling, Muay Thai, and Karate."

REVIEWER_7_NAME: "Gaetano Dimaggio"
REVIEWER_7_DATE: "a year ago"
REVIEWER_7_TEXT: "Jamie is an outstanding professor who cares about his students. This academy is world class. I am always amazed at the attention to detail and high skill level. Beginner Friendly &#x2014; this was my first BJJ Academy."

REVIEWER_8_NAME: "Tommy Di Maggio"
REVIEWER_8_DATE: "a year ago"
REVIEWER_8_TEXT: "One of the best schools in the area! Jamie and all the guys there have an amazing game to offer and share. Every time I am there I learn something new. Thanks for giving back to the community."

REVIEWER_9_NAME: "Raffi Naljayan"
REVIEWER_9_DATE: "a year ago"
REVIEWER_9_TEXT: "My daughter had zero athletic ability when she started and she has developed athleticism and a ton of confidence. The instruction is excellent and coaches truly care about every student&#x2019;s development."

REVIEWER_10_NAME: "D.R."
REVIEWER_10_DATE: "a year ago"
REVIEWER_10_TEXT: "Amazing judo school, fantastic facility and incredible staff. Hopefully this is the start of a new, healthier and more disciplined life for my boys. They need at least a 20 star rating."
