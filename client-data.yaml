ABOUT_TEXT: "Camal &amp; Cruz Judo &amp; Jiu Jitsu has been a cornerstone of the Totowa community since 1996. Founded by Sensei Tony Camal and Professor Jamie Cruz, our academy has spent nearly 30 years developing confident, disciplined, and skilled martial artists across northern New Jersey. We teach authentic Judo and Brazilian Jiu Jitsu in a welcoming environment that serves kids, teens, and adults at every level of experience."

# ── Instructors ──────────────────────────────────────────────────────────────
INSTRUCTOR_1_NAME: "Jamie Cruz"
INSTRUCTOR_1_PHOTO: images/instructor/jamie-cruz.png
INSTRUCTOR_1_TITLE: "Head Instructor &amp; Owner, 4th Degree BJJ Black Belt"
INSTRUCTOR_1_BIO: "Jamie Cruz began training Brazilian Jiu-Jitsu in 1994 under the legendary Renzo Gracie. By 2003, Renzo awarded Jamie his black belt &#x2014; making him just the 7th practitioner ever to receive a black belt from the acclaimed martial artist. Now a 4th Degree Black Belt, Jamie has trained UFC-caliber fighters including Jim Miller, Dan Miller, Charlie Brenneman, and Dillon Danis, and is one of the most respected instructors in New Jersey. His philosophy centers on building a framework of proven success for every student &#x2014; beginner to competitor."
INSTRUCTOR_2_NAME: "Tony Camal"
# Real professional headshot — downloaded from camalandcruz.com.
# Client also mentioned a painted portrait photo is coming — swap this when received.
INSTRUCTOR_2_PHOTO: images/instructor/tony-camal.png
INSTRUCTOR_2_TITLE: "Co-Founder &amp; 6th Dan Judo Black Belt"
INSTRUCTOR_2_BIO: "Anthony &#x201C;Tony&#x201D; Camal began his Judo journey in 1967 at age six, eventually becoming a Junior Olympic National Champion (1978), High School National Champion (1979), and three-time Senior National medalist. He opened Camal Judo in 1996, building it into one of New Jersey&#x2019;s most decorated Judo academies &#x2014; producing dozens of Junior National Champions, over 10 Senior National medal winners, and 30+ black belts. A career firefighter promoted to Captain, Tony was named USA Judo Amateur Coach of the Year by the U.S. Olympic Committee in 2014. Sensei Camal passed away on July 29, 2024. His legacy endures in every student he trained and in the academy that bears his name."
INSTRUCTOR_3_NAME: "Chris Skelly"
# Real headshot — downloaded from camalandcruz.com.
INSTRUCTOR_3_PHOTO: images/instructor/chris-skelly.jpg
INSTRUCTOR_3_TITLE: "Head Judo Instructor"
INSTRUCTOR_3_BIO: "Chris Skelly stepped into the role of Head Judo Instructor following the passing of his Sensei, Anthony &#x201C;Tony&#x201D; Camal, in 2024. Trained directly under Sensei Camal, Chris carries forward the same rigorous technical standards and competitive spirit that made Camal Judo one of the most decorated academies in New Jersey. He is committed to honoring his Sensei&#x2019;s legacy by continuing to develop the next generation of Judo champions at Camal &amp; Cruz."

